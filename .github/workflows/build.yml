name: Build Kernel with KernelSU-Next
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev cpio

      - name: Clone Specific AOSP Clang Toolchain
        run: |
          # Native sparse cloning downloads only the folder framework metadata
          git clone --depth=1 --sparse -b main https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang
          cd clang
          # Materialize strictly the required compiler directory contents
          git sparse-checkout set clang-r510928

      - name: Clone Kernel Source
        run: |
          # Targeting the unified sm8250 branch for crDroid 12.x / 16.x
          git clone --depth=1 -b 16.0-alioth https://github.com/crdroidandroid/android_kernel_xiaomi_sm8250.git kernel

      - name: Inject KernelSU-Next
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

      - name: Apply Defconfig Tweaks Safely
        run: |
          cd kernel
          # Standard unified sm8250 configuration target file
          DEFCONFIG_PATH="arch/arm64/configs/vendor/kona-perf_defconfig"
          
          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "Kona perf configuration missing, checking architecture root layout..."
            DEFCONFIG_PATH="arch/arm64/configs/kona-perf_defconfig"
          fi
          echo "Targeting configuration file: $DEFCONFIG_PATH"
          
          # Idempotent editing: verify line parameters before appending to prevent loop conflicts
          grep -q '^CONFIG_KSU=' "$DEFCONFIG_PATH" || echo "CONFIG_KSU=y" >> "$DEFCONFIG_PATH"
          grep -q '^CONFIG_KPROBES=' "$DEFCONFIG_PATH" || echo "CONFIG_KPROBES=y" >> "$DEFCONFIG_PATH"
          grep -q '^CONFIG_KPROBE_EVENTS=' "$DEFCONFIG_PATH" || echo "CONFIG_KPROBE_EVENTS=y" >> "$DEFCONFIG_PATH"
          grep -q '^CONFIG_OVERLAY_FS=' "$DEFCONFIG_PATH" || echo "CONFIG_OVERLAY_FS=y" >> "$DEFCONFIG_PATH"

      - name: Compile Kernel
        run: |
          cd kernel
          # Perfect absolute routing to the localized toolchain binaries
          export PATH="$(pwd)/../clang/clang-r510928/bin:$PATH"
          
          # Set the targeted configuration layout name explicitly
          CONFIG_NAME="vendor/kona-perf_defconfig"
          if [ ! -f "arch/arm64/configs/$CONFIG_NAME" ]; then
            CONFIG_NAME="kona-perf_defconfig"
          fi
          
          make O=out ARCH=arm64 $CONFIG_NAME
          
          # Build via modern unified LLVM engine parameters
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          
          # Dynamically captures the compressed kernel image target
          if [ -f kernel/out/arch/arm64/boot/Image.gz ]; then
            cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
          else
            cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          fi
          
          cd AnyKernel3
          # Clean architecture adjustments for generic dynamic block partitions mapping
          sed -i 's/block=\/dev\/block\/platform\/omap\/omap_hsmmc.0\/by-name\/boot;/block=auto;/g' anykernel.sh
          
          # Set explicit target identification identity parameters to enforce device verification checks
          sed -i 's/device.name1=/device.name1=munch/g' anykernel.sh
          
          zip -r9 ../KSU_Next_Munch_Kernel.zip * -x .git* README.md

      - name: Upload Flashable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Next-Munch-Flashable
          path: KSU_Next_Munch_Kernel.zip
